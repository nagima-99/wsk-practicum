<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | Кофейня "Zerno"</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>

    <header class="header">
        <div class="container header-wrap">
            <a href="index.html" class="logo" style="text-decoration: none;">Zerno.</a>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="menu.html">Меню</a></li>
                    <li><a href="contacts.html" style="color: #c97a3e;">Контакты</a></li>
                    <li><a href="booking.html" class="btn-nav-book">Бронь стола</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <div class="container section-padding">
            <h2>Свяжитесь с нами</h2>
            <div class="contacts-wrapper">
                
                <div class="contact-info">
                    <h3>Наш адрес</h3>
                    <p>ул. Пушкина, дом Колотушкина, 15</p>
                    <h3>Телефон</h3>
                    <p>+7 (999) 123-45-67</p>
                    <h3>Время работы</h3>
                    <p>Ежедневно с 08:00 до 22:00</p>
                </div>

                <div class="contact-form">
                    <h3>Оставить отзыв</h3>
                    <form action="#" method="POST">
                        <input type="text" placeholder="Ваше имя" required class="form-input">
                        <input type="email" placeholder="Ваш Email" required class="form-input">
                        <textarea placeholder="Ваше сообщение..." rows="5" required class="form-input"></textarea>
                        <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer;">Отправить</button>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="copyright">© 2026 Кофейня "Zerno". Учебный проект.</p>
        </div>
    </footer>

</body>
</html>
